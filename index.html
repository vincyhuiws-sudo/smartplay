        try {

            // 這裡是簡單的測試，確保數據讀到了
            console.log("成功讀取數據:", result);

            // 下面這行只是範例，你需要根據你 data.json 的實際內容調整
            const slotsData = result.data.afternoon.distList[0].slots; 
            
            document.getElementById('last-update').innerText = new Date().toLocaleString();
            
            // 這裡呼叫你的渲染函數
            renderTable(slotsData);
            
        } catch (error) {
            console.error("讀取失敗:", error);
            document.getElementById('last-update').innerText = "讀取失敗，請檢查 data.json 格式";
        }
    }

    // 呼叫載入函數
    loadData();
